<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criminal Case Files | Classified Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="noise-overlay"></div>
    <div class="scanlines"></div>

    <!-- Cinematic corner brackets -->
    <div class="corner corner--tl"></div>
    <div class="corner corner--tr"></div>
    <div class="corner corner--bl"></div>
    <div class="corner corner--br"></div>

    <!-- ═══════════════ HERO ═══════════════ -->
    <header class="archive-hero">
        <div class="hero-bg-grid"></div>

        <div class="classified-bar">
            <span class="cb-line"></span>
            <span class="cb-text">
                <span class="dot pulse-dot"></span>
                CLASSIFIED RECORDS
                <span class="dot pulse-dot"></span>
            </span>
            <span class="cb-line"></span>
        </div>

        <div class="archive-hero-content">
            <h1 class="archive-title">
                <span class="title-criminal">CRIMINAL</span>
                <span class="title-case-files">CASE FILES</span>
            </h1>
            <p class="hero-tagline">
                EVERY INVESTIGATION HIDES
                <em>LIES, MOTIVES,</em> AND <em>SECRETS.</em>
            </p>
        </div>
    </header>

    <!-- ═══════════════ CASES ═══════════════ -->
    <section class="case-selection">
        <div class="case-grid" id="case-grid">
            <!-- Cards injected by JS -->
        </div>
    </section>

    <!-- ═══════════════ FOOTER ═══════════════ -->
    <footer class="site-footer">
        <div class="footer-inner">
            <span class="footer-logo">ARCHIVE_OS <span class="footer-ver">v2.4</span></span>
            <span class="footer-copy">© 2026 CLASSIFIED — ALL RIGHTS RESERVED</span>
            <span class="footer-status">STATUS: <span class="status-live">SECURE</span></span>
        </div>
    </footer>
    <script src="cases.js"></script>
    <script src="index.js"></script>
    
</body>
</html>
